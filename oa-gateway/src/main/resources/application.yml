server:
  port: 10002

spring:
  application:
    name: oa-gateway
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  cloud:
    nacos:
      server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
      username: ${NACOS_USERNAME:nacos}
      password: ${NACOS_PASSWORD:nacos}
      config:
        enabled: true
        file-extension: yml
      discovery:
        enabled: true
    gateway:
      server:
              webflux:
                globalcors:
                  add-to-simple-url-handler-mapping: true
                  cors-configurations:
                    '[/**]':
                      allowedOriginPatterns:
                        - ${OA_WEB_ORIGIN_PATTERN:http://localhost:*}
                      allowedMethods: [GET, POST, PUT, DELETE, OPTIONS]
                      allowedHeaders: ['*']
                      exposedHeaders: [X-Trace-Id]
                      allowCredentials: true
                      maxAge: 3600
                routes:
                  - id: identity-service
                    uri: lb://identity-service
                    predicates:
                      - Path=/api/auth/**,/api/identity/**,/api/employees/**
                  - id: oa-business-service
                    uri: lb://oa-business-service
                    predicates:
                      - Path=/api/attendance/**,/api/leaves/**,/api/contents/**
                  - id: intelligence-service
                    uri: lb://intelligence-service
                    predicates:
                      - Path=/api/search/**,/api/ai/**
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:../.env[.properties]
      - "optional:nacos:${spring.application.name}.yml"
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      timeout: 2s


oa:
  security:
    jwt-secret: ${JWT_SECRET}
    public-paths:
      - /api/auth/login
      - /actuator/health

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  file:
    name: logs/oa-gateway.log
