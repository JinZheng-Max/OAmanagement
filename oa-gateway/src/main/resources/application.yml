server:
  port: 10002

spring:
  application:
    name: oa-gateway
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  cloud:
    nacos:
      config:
        enabled: false
      discovery:
        enabled: false
    gateway:
      server:
        webflux:
          globalcors:
            add-to-simple-url-handler-mapping: true
            cors-configurations:
              '[/**]':
                allowedOriginPatterns:
                  - ${OA_WEB_ORIGIN_PATTERN:http://localhost:*}
                allowedMethods: [GET, POST, PUT, DELETE, OPTIONS]
                allowedHeaders: ['*']
                exposedHeaders: [X-Trace-Id]
                allowCredentials: true
                maxAge: 3600
          routes:
            - id: identity-service
              uri: http://localhost:8851
              predicates:
                - Path=/api/auth/**,/api/identity/**,/api/employees/**
            - id: oa-business-service
              uri: http://localhost:8849
              predicates:
                - Path=/api/attendance/**,/api/leaves/**,/api/contents/**
            - id: intelligence-service
              uri: http://localhost:8852
              predicates:
                - Path=/api/search/**,/api/ai/**
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:../.env[.properties]
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2s

oa:
  security:
    jwt-secret: ${JWT_SECRET}
    public-paths:
      - /api/auth/login
      - /actuator/health

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  file:
    name: logs/oa-gateway.log
