server:
  port: 8849

spring:
  application:
    name: oa-business-service
  autoconfigure:
    exclude:
      - com.alibaba.cloud.nacos.NacosConfigAutoConfiguration
      - com.alibaba.cloud.nacos.discovery.NacosDiscoveryAutoConfiguration
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:../.env[.properties]

management:
  endpoints:
    web:
      exposure:
        include: health,info
