server:
  port: 8851

spring:
  application:
    name: identity-service
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:../.env[.properties]
  datasource:
    url: ${MYSQL_URL}
    username: ${MYSQL_USERNAME}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2s
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:x}
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

mybatis:
  configuration:
    map-underscore-to-camel-case: true
  mapper-locations: classpath:mapper/**/*.xml

oa:
  bootstrap:
    admin:
      username: ${OA_BOOTSTRAP_ADMIN_USERNAME:}
      password: ${OA_BOOTSTRAP_ADMIN_PASSWORD:}
  security:
    jwt-secret: ${JWT_SECRET}
    access-token-ttl: 30m
  cors:
    allowed-origin-pattern: ${OA_WEB_ORIGIN_PATTERN:http://localhost:*}

management:
  endpoints:
    web:
      exposure:
        include: health,info


logging:
  file:
    name: logs/identity-service.log
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] traceId=%X{traceId:-} %logger{36} - %msg%n"
