server:
  port: 8851
  address: 0.0.0.0

spring:
  application:
    name: identity-service
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  cloud:
    nacos:
      server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
      username: ${NACOS_USERNAME:nacos}
      password: ${NACOS_PASSWORD:nacos}
      config:
        enabled: true
        file-extension: yml
      discovery:
        enabled: true
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:../.env[.properties]
      - "optional:nacos:${spring.application.name}.yml"
  datasource:
    url: ${MYSQL_URL}
    username: ${MYSQL_USERNAME}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      timeout: 2s

  flyway:
    enabled: false
    baseline-on-migrate: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

mybatis:
  configuration:
    map-underscore-to-camel-case: true
  mapper-locations: classpath:mapper/**/*.xml




oa:
  bootstrap:
    admin:
      username: ${OA_BOOTSTRAP_ADMIN_USERNAME}
      password: ${OA_BOOTSTRAP_ADMIN_PASSWORD}
  security:
    jwt-secret: ${JWT_SECRET}
    access-token-ttl: 30m
  cors:
    allowed-origin-pattern: ${OA_WEB_ORIGIN_PATTERN:http://localhost:*}

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  file:
    name: logs/identity-service.log
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] traceId=%X{traceId:-} %logger{36} - %msg%n"
